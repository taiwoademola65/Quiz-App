<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container h-75 mt-5" style="max-width: 600px;">
    <div class="card shadow-sm">
      <div class="card-body p-4">

        <h3 id="question-text" class="card-title mb-4 text-center text-dark">
          Question text will go here...
        </h3>

        <div id="choices-container" class="d-grid gap-2 mb-4">
        </div>

        <div class="d-grid">
          <button id="next-btn" class="btn btn-success btn-md">Next Question</button>
        </div>

      </div>
    </div>
  </div>



  <script>
    const quizData = [
      {
        question: 'Which language runs in a web browser?',
        options: ["Java", "C", "Python", "javaScript"],
        correct: 'javaScript'
      },
      {
        question: 'What does CSS stand for?',
        options: ["Central Style Sheets", "Cascading Style Sheets", "Cascading Simple Sheets", "Cars SUVs Sailboats"],
        correct: "Cascading Style Sheets"
      },

      {
        question: "Which HTML element is used for JavaScript?",
        options: ["<scripting>", "<js>", "<script>", "<javascript>"],
        correct: "<script>"
      }

    ];
    let currentQuestionIndex = 0;
    
   const loadQuestion = () => {
  let questionDisplay = document.getElementById('question-text');
  let optionDisplay = document.getElementById('choices-container');

  optionDisplay.innerHTML = '';

  let currentQuiz = quizData[currentQuestionIndex];
  questionDisplay.textContent = currentQuiz.question;
  
  // ─── FIXED THIS LINE BELOW ───
  for (let i = 0; i < currentQuiz.options.length; i++) { 
    const button = document.createElement("button");
    button.textContent = currentQuiz.options[i];
    button.className = "btn btn-outline-dark text-start p-2"; 
    
    button.addEventListener("click", function() {
        if (button.textContent === currentQuiz.correct) {
            alert("Correct! 🎉");
        } else {
            alert("Wrong! ❌");
        }
    });

    optionDisplay.appendChild(button);
  }
}

loadQuestion();
  </script>

</body>

</html>
