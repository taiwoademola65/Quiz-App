<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container h-75 mt-5" style="max-width: 600px;">
    <div class="card shadow-sm">
      <div class="card-body p-4" id="container">

        <h3 id="question-text" class="card-title mb-4 text-center text-dark">
          Question text will go here...
        </h3>

        <div id="choices-container" class="gap-2 mb-4" style="display: none;">
          <button class="btn btn-primary" id="option1" onclick="getOption(this)"></button>
          <button class="btn btn-primary" id="option2" onclick="getOption(this)"></button>
          <button class="btn btn-primary" id="option3" onclick="getOption(this)"></button>
          <button class="btn btn-primary" id="option4" onclick="getOption(this)"></button>
        </div>

        <div>
          <button id="startBtn" class="btn btn-success btn-md w-100" onclick='startTest()'>Start Test</button>
          <button id="endBtn" class="btn btn-success btn-md w-100" style="display: none;" onclick='endBtn()'>End
            Test</button>
        </div>

        <div id="btn" style="display: none;">
          <button id="prev-btn" class="btn btn-success btn-md w-100 me-2" onclick='prev()'>Prev</button>
          <button id="next-btn" class="btn btn-success btn-md w-100" onclick='next()'>Next</button>
        </div>


      </div>
    </div>
  </div>



  <script>
    const quizData = [
      {
        num: 1,
        question: 'Which language runs in a web browser?',
        options: ["Java", "C", "Python", "javaScript"],
        correct: 'javaScript'
      },
      {
        num: 2,
        question: 'What does CSS stand for?',
        options: ["Central Style Sheets", "Cascading Style Sheets", "Cascading Simple Sheets", "Cars SUVs Sailboats"],
        correct: "Cascading Style Sheets"
      },

      {
        num: 3,
        question: "Which HTML element is used for JavaScript?",
        options: ["scripting", "js", "script", "javascript"],
        correct: "script"
      }
    ];
    let currentQuestionIndex = 1;
    score = 0
    let correctAnser;

    const startTest = () => {

      // optionDisplay.innerHTML = '';
      let questionDisplay = document.getElementById('question-text');
      let option1Display = document.getElementById('option1')
      let option2Display = document.getElementById('option2')
      let option3Display = document.getElementById('option3')
      let option4Display = document.getElementById('option4')
      // console.log(questionDisplay);

      for (let i = 0; i < quizData.length; i++) {
        if (quizData[i].num == currentQuestionIndex) {
          // console.log(quizData[i].question);

          document.getElementById('choices-container').style.display = 'flex'
          questionDisplay.innerText = `${quizData[i].question}`
          option1Display.innerHTML = ` ${quizData[i].options[0]}`
          option2Display.innerHTML = `${quizData[i].options[1]}`
          option3Display.innerHTML = `${quizData[i].options[2]}`
          option4Display.innerHTML = `${quizData[i].options[3]}`
          correctAnser = quizData[i].correct
          // console.log(document.getElementById('option1').innerHTML);
          // }
          if (quizData[i].num != quizData.length) {
            document.getElementById('startBtn').style.display = 'none'
            document.getElementById('btn').style.display = 'flex'
          } else {
            document.getElementById('startBtn').style.display = 'none'
            document.getElementById('endBtn').style.display = 'block'
            document.getElementById('btn').style.display = 'none'
          }

        }

      }

    }


    const getOption = (clickedBtn) => {
      let selectedOption = clickedBtn.innerText
      // console.log(selectedOption);
      if (selectedOption == correctAnser) {
        score++
        console.log(score);
      }
      currentQuestionIndex += 1
    }

    const next = () => {
      startTest();
    }

    const endBtn = () => {
      container = document.getElementById('container')
      let htmlContent =`<h1 class="text-success"> Congratulations on completing the test. Your score is ${score}</h1> 
      <br>

       <table class="table">
          <tr>
            <th>S/N</th>
            <th>Question</th>
            <th>Correct Answer</th>
          </tr>
     
      `

      

      for (let i = 0; i < quizData.length; i++) {
        htmlContent += `         
          <tr>
            <td id="s/n" scope='row'>${quizData[i].num}</td>
            <td id="showQuestion" scope='row'> ${quizData[i].question}</td>
            <td id="showAnswer" scope='row'> ${quizData[i].correct}</td>
          </tr>`

        // document.getElementById('s/n').innerText += `${i + 1}`
        // document.getElementById('showQuestion').innerText += `${quizData[i].question}`
        // document.getElementById('showAnswer').innerText += `${quizData[i].correct}`

      }

  htmlContent += `
    
    </table>
  `;

  container.innerHTML = htmlContent;


    }


  </script>

</body>

</html>
